<section class="hero">

  <!-- Formes décoratives -->
  <div class="shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>
    <div class="shape shape-5"></div>
  </div>

  <div class="container hero-container">

    <div class="hero-content">

      <div class="badge">
        <span class="dot"></span>
        <span>{{ 'hero.available' | translate }} 👋</span>
      </div>

      <h1 class="hero-title">
        <span class="title-line">{{ 'hero.greeting' | translate }}</span>
        <span class="title-name">Loua Jday</span>
      </h1>

      <h2 class="hero-subtitle">
        {{ 'hero.title' | translate }}
        <span class="subtitle-accent"> — {{ 'hero.subtitle' | translate }}</span>
      </h2>

      <p class="hero-description">
        {{ 'hero.description' | translate }}
      </p>

      <div class="hero-actions">
        <button class="btn btn-primary" (click)="scrollTo('projects')">
          {{ 'hero.viewProjects' | translate }}
          <span class="arrow">→</span>
        </button>
        <button class="btn btn-secondary" (click)="scrollTo('contact')">
          {{ 'hero.contactMe' | translate }}
        </button>
      </div>

    <div class="social-links">

   <!-- Visuel à droite : photo de profil avec cartes flottantes -->
<div class="hero-visual">
  <div class="floating-card card-1">
    <span class="card-emoji">⚡</span>
    <span class="card-label">Spring Boot</span>
  </div>
  <div class="floating-card card-2">
    <span class="card-emoji">🅰️</span>
    <span class="card-label">Angular</span>
  </div>
  <div class="floating-card card-3">
    <span class="card-emoji">🐳</span>
    <span class="card-label">Docker</span>
  </div>
  <div class="floating-card card-4">
    <span class="card-emoji">🔗</span>
    <span class="card-label">Blockchain</span>
  </div>

  <!-- Photo de profil avec halo coloré -->
  <div class="profile-photo-wrapper">
    <div class="photo-ring"></div>
    <div class="photo-container">
      <img src="images/profile.jpeg" alt="Loua Jday" class="profile-photo">
    </div>
  </div>
</div>

  </div>

  <div class="scroll-indicator" (click)="scrollTo('about')">

    </div>
  </div>
</section>
